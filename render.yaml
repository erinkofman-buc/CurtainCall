databases:
  - name: curtaincall-db
    plan: starter
    databaseName: curtaincall
    user: curtaincall

services:
  - type: web
    name: curtaincall
    runtime: node
    plan: starter
    buildCommand: npm install && node migrations/migrate.js && node seeds/seed.js
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: curtaincall-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: MOCK_EMAIL
        value: "true"
      - key: MOCK_AI
        value: "true"
      - key: NODE_ENV
        value: production
